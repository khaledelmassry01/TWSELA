<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحليلات المتقدمة - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../src/css/styles.css" rel="stylesheet">
    <link href="../src/css/main.css" rel="stylesheet">
    <link href="../src/css/twsela-design.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" aria-label="القائمة الجانبية">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <a href="/owner/dashboard" class="nav-link" aria-label="لوحة التحكم"><i class="fas fa-tachometer-alt"></i><span>لوحة التحكم</span></a>
                <a href="/owner/shipments" class="nav-link" aria-label="الشحنات"><i class="fas fa-shipping-fast"></i><span>الشحنات</span></a>
                <a href="/owner/reports.html" class="nav-link" aria-label="التقارير"><i class="fas fa-chart-bar"></i><span>التقارير</span></a>
                <a href="/owner/analytics.html" class="nav-link active" aria-label="التحليلات"><i class="fas fa-chart-pie"></i><span>التحليلات</span></a>
                <a href="/owner/settings.html" class="nav-link" aria-label="الإعدادات"><i class="fas fa-cog"></i><span>الإعدادات</span></a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <div class="container-fluid py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-chart-pie me-2"></i> التحليلات المتقدمة</h2>
                    <div class="d-flex gap-2 align-items-center">
                        <label for="analyticsStartDate" class="form-label mb-0">من:</label>
                        <input type="date" class="form-control form-control-sm" id="analyticsStartDate" aria-label="تاريخ البداية">
                        <label for="analyticsEndDate" class="form-label mb-0">إلى:</label>
                        <input type="date" class="form-control form-control-sm" id="analyticsEndDate" aria-label="تاريخ النهاية">
                        <button class="btn btn-primary btn-sm" id="loadAnalyticsBtn" aria-label="تحميل التحليلات">
                            <i class="fas fa-sync-alt me-1"></i> تحديث
                        </button>
                    </div>
                </div>

                <!-- Revenue -->
                <div class="card mb-4">
                    <div class="card-header"><h5 class="mb-0"><i class="fas fa-coins me-2"></i> الإيرادات</h5></div>
                    <div class="card-body" id="revenueContainer">
                        <div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                    </div>
                </div>

                <!-- Status Distribution -->
                <div class="card mb-4">
                    <div class="card-header"><h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i> توزيع حالات الشحنات</h5></div>
                    <div class="card-body" id="statusDistContainer">
                        <div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                    </div>
                </div>

                <div class="row">
                    <!-- Courier Ranking -->
                    <div class="col-lg-6 mb-4">
                        <div class="card h-100">
                            <div class="card-header"><h5 class="mb-0"><i class="fas fa-medal me-2"></i> ترتيب أداء المناديب</h5></div>
                            <div class="card-body" id="courierRankContainer">
                                <div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></div>
                            </div>
                        </div>
                    </div>
                    <!-- Top Merchants -->
                    <div class="col-lg-6 mb-4">
                        <div class="card h-100">
                            <div class="card-header"><h5 class="mb-0"><i class="fas fa-store me-2"></i> أفضل التجار</h5></div>
                            <div class="card-body" id="topMerchantsContainer">
                                <div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../src/js/shared/sanitizer.js"></script>
    <script src="../src/js/pages/owner-analytics-page.js"></script>
</body>
</html>
