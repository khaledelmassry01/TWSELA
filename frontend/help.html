<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>مركز المساعدة - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <a href="#" id="backToDashboard" class="nav-link">
                    <i class="fas fa-arrow-right"></i>
                    <span>العودة للوحة التحكم</span>
                </a>
                <a href="/support.html" class="nav-link">
                    <i class="fas fa-life-ring"></i>
                    <span>الدعم</span>
                </a>
                <a href="/help.html" class="nav-link active">
                    <i class="fas fa-question-circle"></i>
                    <span>المساعدة</span>
                </a>
                <a href="/wallet.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>المحفظة</span>
                </a>
                <a href="/notifications.html" class="nav-link">
                    <i class="fas fa-bell"></i>
                    <span>الإشعارات</span>
                </a>
                <a href="/profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>الملف الشخصي</span>
                </a>
                <a href="/settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-link logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">مركز المساعدة</h1>
                </div>
                <div class="header-right">
                    <div class="profile-dropdown">
                        <button class="profile-dropdown-toggle">
                            <i class="fas fa-user-circle"></i>
                            <span class="user-name">المستخدم</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="profile-dropdown-menu">
                            <a href="/profile.html" class="dropdown-item">
                                <i class="fas fa-user"></i>
                                <span>الملف الشخصي</span>
                            </a>
                            <a href="/settings.html" class="dropdown-item">
                                <i class="fas fa-cog"></i>
                                <span>الإعدادات</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item logout-btn">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>تسجيل الخروج</span>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Help Content -->
            <div class="dashboard-content">
                <!-- Search Section -->
                <div class="content-card mb-4">
                    <div class="card-body text-center py-4">
                        <h3 class="mb-3"><i class="fas fa-question-circle text-primary me-2"></i>كيف يمكننا مساعدتك؟</h3>
                        <div class="row justify-content-center">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <input type="text" class="form-control form-control-lg" id="helpSearch" placeholder="ابحث في مقالات المساعدة...">
                                    <button class="btn btn-primary" id="searchBtn">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Categories Section -->
                <div id="categoriesSection">
                    <h5 class="mb-3"><i class="fas fa-folder-open me-2"></i>التصنيفات</h5>
                    <div class="row g-3 mb-4" id="categoriesGrid">
                        <!-- Categories loaded dynamically -->
                        <div class="col-12 text-center py-4 text-muted">
                            <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
                        </div>
                    </div>
                </div>

                <!-- Articles List Section -->
                <div id="articlesSection">
                    <h5 class="mb-3"><i class="fas fa-file-alt me-2"></i>المقالات</h5>
                    <div id="articlesList" class="mb-4">
                        <!-- Articles loaded dynamically -->
                    </div>
                </div>

                <!-- Article Detail Section (Hidden) -->
                <div class="d-none" id="articleDetailSection">
                    <div class="d-flex align-items-center mb-3">
                        <button class="btn btn-outline-secondary btn-sm me-2" id="backToArticlesBtn">
                            <i class="fas fa-arrow-right me-1"></i>العودة
                        </button>
                        <h5 class="mb-0" id="articleTitle"></h5>
                    </div>
                    <div class="content-card">
                        <div class="card-body">
                            <div class="mb-3">
                                <span class="badge bg-primary" id="articleCategory"></span>
                                <small class="text-muted ms-2" id="articleDate"></small>
                            </div>
                            <div id="articleContent" class="article-content">
                                <!-- Article content loaded dynamically -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Help -->
                <div class="content-card mt-4">
                    <div class="card-body text-center py-4">
                        <h5 class="mb-3">لم تجد إجابة لسؤالك؟</h5>
                        <p class="text-muted mb-3">فريق الدعم الفني جاهز لمساعدتك</p>
                        <a href="/support.html" class="btn btn-primary">
                            <i class="fas fa-headset me-2"></i>تواصل مع الدعم
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/services/config.js"></script>
    <script src="src/js/shared/SharedDataUtils.js"></script>
    <script src="src/js/shared/GlobalUIHandler.js"></script>
    <script src="src/js/services/NotificationService.js"></script>
    <script src="src/js/services/auth_service.js"></script>
    <script src="src/js/services/api_service.js"></script>
    <script src="src/js/services/websocket_service.js"></script>
    <script src="src/js/shared/NotificationBell.js"></script>
    <script src="src/js/app.js"></script>
    <script src="src/js/pages/help-page.js"></script>
</body>
</html>
