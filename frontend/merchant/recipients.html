<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>دفتر العناوين - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../src/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" role="navigation" aria-label="القائمة الرئيسية">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <a href="/merchant/dashboard.html" class="nav-link">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="/merchant/create-shipment.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i>
                    <span>إنشاء شحنة</span>
                </a>
                <a href="/merchant/bulk-upload.html" class="nav-link">
                    <i class="fas fa-file-upload"></i>
                    <span>رفع بالجملة</span>
                </a>
                <a href="/merchant/shipments.html" class="nav-link">
                    <i class="fas fa-shipping-fast"></i>
                    <span>الشحنات</span>
                </a>
                <a href="/merchant/labels.html" class="nav-link">
                    <i class="fas fa-barcode"></i>
                    <span>الملصقات</span>
                </a>
                <a href="/merchant/pickups.html" class="nav-link">
                    <i class="fas fa-truck-loading"></i>
                    <span>جدولة الاستلام</span>
                </a>
                <a href="/merchant/invoices.html" class="nav-link">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>الفواتير</span>
                </a>
                <a href="/merchant/recipients.html" class="nav-link active">
                    <i class="fas fa-address-book"></i>
                    <span>دفتر العناوين</span>
                </a>
                <a href="/merchant/returns.html" class="nav-link">
                    <i class="fas fa-undo"></i>
                    <span>المرتجعات</span>
                </a>
                <a href="/wallet.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>المحفظة</span>
                </a>
                <a href="/notifications.html" class="nav-link">
                    <i class="fas fa-bell"></i>
                    <span>الإشعارات</span>
                </a>
                <a href="/profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>الملف الشخصي</span>
                </a>
                <a href="/settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-link logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" aria-label="تبديل القائمة الجانبية">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">دفتر العناوين</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addRecipientModal">
                        <i class="fas fa-plus me-1"></i> إضافة مستلم
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Search -->
                <div class="content-card mb-4">
                    <div class="card-content">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="recipientSearch" placeholder="بحث بالاسم أو الهاتف...">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-outline-primary w-100" id="searchByPhoneBtn">
                                    <i class="fas fa-search me-1"></i> بحث بالهاتف
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recipients Grid -->
                <div class="row g-3" id="recipientsGrid">
                    <!-- Recipients cards loaded dynamically -->
                </div>

                <!-- Empty State -->
                <div class="content-card text-center p-5 d-none" id="emptyState">
                    <i class="fas fa-address-book fa-3x text-muted mb-3"></i>
                    <h5>لا يوجد مستلمون</h5>
                    <p class="text-muted">أضف مستلمين لتسهيل إنشاء الشحنات</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Recipient Modal -->
    <div class="modal fade" id="addRecipientModal" tabindex="-1" aria-labelledby="addRecipientModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addRecipientModalLabel">إضافة مستلم جديد</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
                </div>
                <div class="modal-body">
                    <form id="addRecipientForm">
                        <div class="mb-3">
                            <label for="recipientName" class="form-label">الاسم</label>
                            <input type="text" class="form-control" id="recipientName" required placeholder="اسم المستلم">
                        </div>
                        <div class="mb-3">
                            <label for="recipientPhone" class="form-label">رقم الهاتف</label>
                            <input type="tel" class="form-control" id="recipientPhone" required placeholder="01xxxxxxxxx">
                        </div>
                        <div class="mb-3">
                            <label for="recipientEmail" class="form-label">البريد الإلكتروني (اختياري)</label>
                            <input type="email" class="form-control" id="recipientEmail" placeholder="email@example.com">
                        </div>
                        <hr>
                        <h6>العنوان الرئيسي</h6>
                        <div class="mb-3">
                            <label for="addressLabel" class="form-label">تسمية العنوان</label>
                            <input type="text" class="form-control" id="addressLabel" placeholder="المنزل، العمل، إلخ">
                        </div>
                        <div class="mb-3">
                            <label for="addressLine" class="form-label">العنوان بالتفصيل</label>
                            <input type="text" class="form-control" id="addressLine" required placeholder="الشارع، المبنى، الشقة">
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="addressCity" class="form-label">المدينة</label>
                                <input type="text" class="form-control" id="addressCity" required placeholder="المدينة">
                            </div>
                            <div class="col-md-6">
                                <label for="addressArea" class="form-label">المنطقة</label>
                                <input type="text" class="form-control" id="addressArea" placeholder="المنطقة">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" id="submitRecipientBtn">
                        <i class="fas fa-save me-1"></i> حفظ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Addresses Modal -->
    <div class="modal fade" id="addressesModal" tabindex="-1" aria-labelledby="addressesModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addressesModalLabel">عناوين المستلم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
                </div>
                <div class="modal-body" id="addressesBody">
                    <!-- Addresses loaded dynamically -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="addAddressBtn">
                        <i class="fas fa-plus me-1"></i> إضافة عنوان
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../src/js/shared/config.js"></script>
    <script src="../../src/js/shared/SharedDataUtils.js"></script>
    <script src="../../src/js/shared/GlobalUIHandler.js"></script>
    <script src="../../src/js/shared/NotificationService.js"></script>
    <script src="../../src/js/shared/BasePageHandler.js"></script>
    <script src="../../src/js/services/auth_service.js"></script>
    <script src="../../src/js/services/api_service.js"></script>
    <script src="../../src/js/services/websocket_service.js"></script>
    <script src="../../src/js/shared/NotificationBell.js"></script>
    <script src="../../src/js/app.js"></script>
    <script src="../../src/js/pages/merchant-recipients-page.js"></script>
</body>
</html>
