<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>المحفظة - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (dynamically populated based on role) -->
        <nav class="sidebar" role="navigation" aria-label="القائمة الرئيسية">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav" id="sidebarNav">
                <!-- Populated dynamically by JS based on user role -->
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="sidebar-toggle" aria-label="تبديل القائمة الجانبية">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="header-title">المحفظة</h1>
                </div>
                <div class="header-actions">
                    <div class="profile-dropdown">
                        <button class="profile-dropdown-toggle">
                            <i class="fas fa-user-circle"></i>
                            <span class="user-name">المستخدم</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <!-- Wallet Summary Cards -->
                <div class="stats-grid">
                    <div class="stat-card blue" data-card="0">
                        <div class="stat-label">الرصيد الحالي</div>
                        <div class="stat-value" id="walletBalance">0.00 جنيه</div>
                        <div class="stat-icon blue">
                            <i class="fas fa-wallet"></i>
                        </div>
                    </div>
                    <div class="stat-card green" data-card="1">
                        <div class="stat-label">إجمالي الإيداعات</div>
                        <div class="stat-value" id="totalCredits">0.00 جنيه</div>
                        <div class="stat-icon green">
                            <i class="fas fa-arrow-down"></i>
                        </div>
                    </div>
                    <div class="stat-card orange" data-card="2">
                        <div class="stat-label">إجمالي السحوبات</div>
                        <div class="stat-value" id="totalDebits">0.00 جنيه</div>
                        <div class="stat-icon orange">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                    </div>
                    <div class="stat-card purple" data-card="3">
                        <div class="stat-label">معاملات معلقة</div>
                        <div class="stat-value" id="pendingTransactions">0</div>
                        <div class="stat-icon purple">
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                </div>

                <!-- Actions Row -->
                <div class="row mb-4">
                    <div class="col-12">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#withdrawModal">
                            <i class="fas fa-money-bill-wave"></i>
                            طلب سحب
                        </button>
                    </div>
                </div>

                <!-- Transactions Table -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">سجل المعاملات</h5>
                        <div class="card-actions">
                            <select class="form-select form-select-sm" id="transactionFilter" style="width: auto; display: inline-block;">
                                <option value="all">الكل</option>
                                <option value="CREDIT">إيداعات</option>
                                <option value="DEBIT">سحوبات</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table data-table" id="transactionsTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>النوع</th>
                                        <th>المبلغ</th>
                                        <th>السبب</th>
                                        <th>الوصف</th>
                                        <th>التاريخ</th>
                                        <th>الرصيد بعد</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated dynamically -->
                                </tbody>
                            </table>
                        </div>
                        <!-- Pagination -->
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span id="paginationInfo" class="text-muted">عرض 0 من 0</span>
                            <div>
                                <button class="btn btn-sm btn-outline-primary" id="prevPage">
                                    <i class="fas fa-chevron-right"></i> السابق
                                </button>
                                <button class="btn btn-sm btn-outline-primary" id="nextPage">
                                    التالي <i class="fas fa-chevron-left"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Withdraw Modal -->
    <div class="modal fade" id="withdrawModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">طلب سحب</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="withdrawForm">
                        <div class="form-group mb-3">
                            <label for="withdrawAmount" class="form-label">المبلغ المراد سحبه (جنيه)</label>
                            <input type="number" class="form-control" id="withdrawAmount" name="amount" min="1" step="0.01" required>
                            <div class="form-text">الرصيد المتاح: <span id="availableBalance">0.00</span> جنيه</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" id="confirmWithdrawBtn">تأكيد السحب</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/shared/config.js"></script>
    <script src="src/js/shared/SharedDataUtils.js?v=20250112-4"></script>
    <script src="src/js/shared/GlobalUIHandler.js?v=20250112-4"></script>
    <script src="src/js/shared/NotificationService.js?v=20250112-4"></script>
    <script src="src/js/shared/BasePageHandler.js?v=20250112-4"></script>
    <script src="src/js/services/auth_service.js?v=20250112-4"></script>
    <script src="src/js/services/api_service.js?v=20250112-4"></script>
    <script src="src/js/app.js?v=20250112-4"></script>
    <script src="src/js/pages/wallet-page.js?v=20250112-4"></script>
</body>
</html>
