<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>مهام الاستلام - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../src/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" role="navigation" aria-label="القائمة الرئيسية">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <a href="/courier/dashboard.html" class="nav-link">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="/courier/manifest.html" class="nav-link">
                    <i class="fas fa-clipboard-list"></i>
                    <span>قائمة التسليم</span>
                </a>
                <a href="/courier/route.html" class="nav-link">
                    <i class="fas fa-route"></i>
                    <span>خريطة المسار</span>
                </a>
                <a href="/courier/delivery.html" class="nav-link">
                    <i class="fas fa-camera"></i>
                    <span>إثبات التسليم</span>
                </a>
                <a href="/courier/pickups.html" class="nav-link active">
                    <i class="fas fa-truck-loading"></i>
                    <span>مهام الاستلام</span>
                </a>
                <a href="/wallet.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>المحفظة</span>
                </a>
                <a href="/notifications.html" class="nav-link">
                    <i class="fas fa-bell"></i>
                    <span>الإشعارات</span>
                </a>
                <a href="/profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>الملف الشخصي</span>
                </a>
                <a href="/settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-link logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" aria-label="تبديل القائمة الجانبية">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">مهام الاستلام اليوم</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-outline-primary" id="refreshPickupsBtn">
                        <i class="fas fa-sync-alt me-1"></i> تحديث
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Stats Cards -->
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                <i class="fas fa-tasks"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="totalTodayPickups">0</div>
                                <div class="stat-label">مهام اليوم</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-info bg-opacity-10 text-info">
                                <i class="fas fa-spinner"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="pendingTodayPickups">0</div>
                                <div class="stat-label">قيد الانتظار</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-success bg-opacity-10 text-success">
                                <i class="fas fa-check-double"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="completedTodayPickups">0</div>
                                <div class="stat-label">مكتملة</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pickups List -->
                <div id="pickupCards">
                    <!-- Pickup cards loaded dynamically -->
                </div>

                <!-- Empty State -->
                <div class="content-card text-center p-5 d-none" id="noPickupsState">
                    <i class="fas fa-truck-loading fa-3x text-muted mb-3"></i>
                    <h5>لا توجد مهام استلام اليوم</h5>
                    <p class="text-muted">سيتم عرض المهام عند تعيينها لك</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../src/js/shared/config.js"></script>
    <script src="../../src/js/shared/SharedDataUtils.js"></script>
    <script src="../../src/js/shared/GlobalUIHandler.js"></script>
    <script src="../../src/js/shared/NotificationService.js"></script>
    <script src="../../src/js/shared/BasePageHandler.js"></script>
    <script src="../../src/js/services/auth_service.js"></script>
    <script src="../../src/js/services/api_service.js"></script>
    <script src="../../src/js/services/websocket_service.js"></script>
    <script src="../../src/js/shared/NotificationBell.js"></script>
    <script src="../../src/js/app.js"></script>
    <script src="../../src/js/pages/courier-pickups-page.js"></script>
</body>
</html>
