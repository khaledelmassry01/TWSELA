<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>خريطة المسار - Twsela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../src/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" role="navigation" aria-label="القائمة الرئيسية">
            <div class="sidebar-header">
                <a href="#" class="sidebar-logo">
                    <i class="fas fa-paper-plane"></i>
                    <span>Twsela</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <a href="/courier/dashboard.html" class="nav-link">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="/courier/manifest.html" class="nav-link">
                    <i class="fas fa-clipboard-list"></i>
                    <span>قائمة التسليم</span>
                </a>
                <a href="/courier/route.html" class="nav-link active">
                    <i class="fas fa-route"></i>
                    <span>خريطة المسار</span>
                </a>
                <a href="/courier/delivery.html" class="nav-link">
                    <i class="fas fa-camera"></i>
                    <span>إثبات التسليم</span>
                </a>
                <a href="/courier/pickups.html" class="nav-link">
                    <i class="fas fa-truck-loading"></i>
                    <span>مهام الاستلام</span>
                </a>
                <a href="/wallet.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>المحفظة</span>
                </a>
                <a href="/notifications.html" class="nav-link">
                    <i class="fas fa-bell"></i>
                    <span>الإشعارات</span>
                </a>
                <a href="/profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>الملف الشخصي</span>
                </a>
                <a href="/settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-link logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" aria-label="تبديل القائمة الجانبية">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">خريطة المسار</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="optimizeRouteBtn">
                        <i class="fas fa-magic me-1"></i> تحسين المسار
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Route Summary -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="totalStops">0</div>
                                <div class="stat-label">نقاط التوقف</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-info bg-opacity-10 text-info">
                                <i class="fas fa-road"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="totalDistance">0</div>
                                <div class="stat-label">كم المسافة</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="estimatedTime">0</div>
                                <div class="stat-label">دقيقة (تقديري)</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="content-card stat-card">
                            <div class="stat-icon bg-success bg-opacity-10 text-success">
                                <i class="fas fa-check-double"></i>
                            </div>
                            <div class="stat-details">
                                <div class="stat-value" id="completedStops">0</div>
                                <div class="stat-label">مكتملة</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Waypoints List -->
                <div class="content-card">
                    <div class="card-header">
                        <h3><i class="fas fa-list-ol me-2"></i>ترتيب نقاط التسليم</h3>
                    </div>
                    <div class="card-content">
                        <div id="waypointsList">
                            <!-- Waypoints loaded dynamically -->
                        </div>
                        <div class="text-center p-4 d-none" id="noRouteState">
                            <i class="fas fa-route fa-3x text-muted mb-3"></i>
                            <h5>لا يوجد مسار حالي</h5>
                            <p class="text-muted">سيتم عرض المسار عند تعيين شحنات للتسليم</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../src/js/shared/config.js"></script>
    <script src="../../src/js/shared/SharedDataUtils.js"></script>
    <script src="../../src/js/shared/GlobalUIHandler.js"></script>
    <script src="../../src/js/shared/NotificationService.js"></script>
    <script src="../../src/js/shared/BasePageHandler.js"></script>
    <script src="../../src/js/services/auth_service.js"></script>
    <script src="../../src/js/services/api_service.js"></script>
    <script src="../../src/js/services/websocket_service.js"></script>
    <script src="../../src/js/shared/NotificationBell.js"></script>
    <script src="../../src/js/app.js"></script>
    <script src="../../src/js/pages/courier-route-page.js"></script>
</body>
</html>
